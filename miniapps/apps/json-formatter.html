<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>json-formatter — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--chrome:#252525;--ink:#d4d4d4;--dim:#555;--bright:#f0f0f0;--prompt:#3fb950;--accent:#c8f53a;--link:#58a6ff;--danger:#f85149;--key:#58a6ff;--str:#3fb950;--num:#ffb700;--bool:#c8f53a;--null:#888;--font:'Fira Code',monospace;}
    body.light{--bg:#f0f0f0;--surface:#e2e2e2;--border:#ccc;--chrome:#d0d0d0;--ink:#2a2a2a;--dim:#888;--bright:#111;--prompt:#1a7f37;--accent:#5a8a00;--link:#0969da;--danger:#cf222e;--key:#0969da;--str:#1a7f37;--num:#b45000;--bool:#5a8a00;--null:#888;}
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);transition:background .2s,color .2s;}
    body{display:flex;align-items:center;justify-content:center;padding:1.5rem;}
    .terminal{width:100%;max-width:960px;height:calc(100vh - 3rem);min-height:480px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
    .titlebar{background:var(--chrome);border-bottom:1px solid var(--border);height:36px;flex-shrink:0;display:flex;align-items:center;padding:0 12px;gap:7px;}
    .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .dot.red{background:#ff5f57;}.dot.yellow{background:#ffbd2e;}.dot.green{background:#27c93f;}
    .titlebar-title{flex:1;text-align:center;font-size:11px;color:var(--dim);letter-spacing:.04em;margin-left:-60px;}
    .toggle{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-family:var(--font);font-size:10px;color:var(--dim);cursor:pointer;transition:color .15s,border-color .15s;}
    .toggle:hover{color:var(--ink);border-color:var(--ink);}
    .editor-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr auto;overflow:hidden;}
    .col-head{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;padding:.6rem 1.25rem .4rem;border-bottom:1px solid var(--border);background:var(--surface);}
    .col-head.right{border-left:1px solid var(--border);}
    .pane{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .pane.right{border-left:1px solid var(--border);}
    textarea.pane{font-family:var(--font);font-size:12px;line-height:1.7;padding:1rem 1.25rem;background:var(--bg);color:var(--ink);border:none;resize:none;outline:none;}
    textarea.pane::placeholder{color:var(--dim);}
    .out-pane{padding:1rem 1.25rem;background:var(--bg);font-size:12px;line-height:1.7;white-space:pre;overflow-x:auto;}
    .jkey{color:var(--key);}.jstr{color:var(--str);}.jnum{color:var(--num);}.jbool{color:var(--bool);}.jnull{color:var(--null);}.jpunct{color:var(--dim);}
    .err{color:var(--danger);white-space:pre-wrap;}
    .foot{grid-column:1/-1;font-size:12px;color:var(--dim);border-top:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
    .foot a{color:var(--link);text-decoration:none;}.foot a:hover{text-decoration:underline;}
    .foot-btns{display:flex;gap:8px;}
    .mini-btn{font-family:var(--font);font-size:10px;padding:2px 9px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);cursor:pointer;transition:color .12s,border-color .12s;}
    .mini-btn:hover{color:var(--accent);border-color:var(--accent);}
    .prompt{color:var(--prompt);font-weight:700;}
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/json-formatter</span>
      <button class="toggle" id="toggle">light</button>
    </div>
    <div class="editor-wrap">
      <div class="col-head"><span class="prompt">$</span> raw json</div>
      <div class="col-head right"><span class="prompt">$</span> formatted</div>
      <textarea class="pane" id="raw" placeholder='{"paste":"ugly json here","and":"watch it format"}' spellcheck="false"></textarea>
      <div class="pane right out-pane" id="formatted"></div>
      <div class="foot">
        <span><span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a></span>
        <div class="foot-btns">
          <button class="mini-btn" id="minify-btn">minify</button>
          <button class="mini-btn" id="copy-btn">copy output</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const rawEl=document.getElementById('raw');
    const fmtEl=document.getElementById('formatted');
    let minify=false;

    function colorize(json){
      return json
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,(m)=>{
          let cls='jnum';
          if(/^"/.test(m)){cls=/:$/.test(m)?'jkey':'jstr';}
          else if(/true|false/.test(m)){cls='jbool';}
          else if(/null/.test(m)){cls='jnull';}
          return`<span class="${cls}">${m}</span>`;
        })
        .replace(/([{}\[\],:])/g,'<span class="jpunct">$1</span>');
    }

    function run(){
      const val=rawEl.value.trim();
      if(!val){fmtEl.innerHTML='';return;}
      try{
        const parsed=JSON.parse(val);
        const str=minify?JSON.stringify(parsed):JSON.stringify(parsed,null,2);
        fmtEl.innerHTML=colorize(str);
      } catch(e){
        fmtEl.innerHTML=`<span class="err">${e.message}</span>`;
      }
    }

    rawEl.addEventListener('input',run);

    document.getElementById('minify-btn').addEventListener('click',()=>{
      minify=!minify;
      document.getElementById('minify-btn').textContent=minify?'format':'minify';
      run();
    });

    document.getElementById('copy-btn').addEventListener('click',()=>{
      if(fmtEl.textContent)navigator.clipboard.writeText(fmtEl.textContent);
    });

    document.getElementById('toggle').addEventListener('click',function(){
      document.body.classList.toggle('light');
      this.textContent=document.body.classList.contains('light')?'dark':'light';
    });
  </script>
</body>
</html>
