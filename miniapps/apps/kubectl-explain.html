<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kubectl-explain — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--chrome:#252525;--ink:#d4d4d4;--dim:#555;--bright:#f0f0f0;--prompt:#3fb950;--accent:#c8f53a;--link:#58a6ff;--font:'Fira Code',monospace;}
    body.light{--bg:#f0f0f0;--surface:#e2e2e2;--border:#ccc;--chrome:#d0d0d0;--ink:#2a2a2a;--dim:#888;--bright:#111;--prompt:#1a7f37;--accent:#5a8a00;--link:#0969da;}
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);transition:background .2s,color .2s;}
    body{display:flex;align-items:center;justify-content:center;padding:1.5rem;}
    .terminal{width:100%;max-width:680px;height:calc(100vh - 3rem);min-height:500px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
    .titlebar{background:var(--chrome);border-bottom:1px solid var(--border);height:36px;flex-shrink:0;display:flex;align-items:center;padding:0 12px;gap:7px;}
    .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .dot.red{background:#ff5f57;}.dot.yellow{background:#ffbd2e;}.dot.green{background:#27c93f;}
    .titlebar-title{flex:1;text-align:center;font-size:11px;color:var(--dim);letter-spacing:.04em;margin-left:-60px;}
    .toggle{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-family:var(--font);font-size:10px;color:var(--dim);cursor:pointer;transition:color .15s,border-color .15s;}
    .toggle:hover{color:var(--ink);border-color:var(--ink);}
    .body{flex:1;overflow-y:auto;padding:1.75rem 2rem 1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .prompt{color:var(--prompt);font-weight:700;}.cmd{color:var(--bright);}
    .head{font-size:13px;margin-bottom:1.5rem;}

    .search-input{width:100%;font-family:var(--font);font-size:13px;padding:.6rem .85rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--bright);outline:none;margin-bottom:1.25rem;transition:border-color .15s;letter-spacing:.02em;}
    .search-input:focus{border-color:var(--accent);}
    .search-input::placeholder{color:var(--dim);}

    .categories{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;}
    .cat-btn{font-family:var(--font);font-size:10px;padding:2px 9px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);cursor:pointer;transition:color .12s,border-color .12s;}
    .cat-btn:hover,.cat-btn.active{color:var(--accent);border-color:var(--accent);}

    .cmd-list{display:flex;flex-direction:column;gap:10px;}
    .cmd-card{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:.9rem 1rem;cursor:pointer;transition:border-color .15s;}
    .cmd-card:hover{border-color:var(--accent);}
    .cmd-card.open{border-color:var(--accent);}
    .cmd-top{display:flex;align-items:baseline;gap:.75rem;}
    .cmd-name{font-size:13px;font-weight:700;color:var(--accent);flex:1;letter-spacing:.02em;}
    .cmd-cat{font-size:10px;color:var(--dim);}
    .cmd-summary{font-size:11px;color:var(--dim);margin-top:.3rem;}
    .cmd-detail{display:none;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border);}
    .cmd-card.open .cmd-detail{display:block;}
    .cmd-example{font-size:11.5px;color:var(--ink);margin-bottom:.4rem;line-height:1.7;}
    .cmd-example .kw{color:var(--prompt);}
    .cmd-example .flag{color:var(--link);}
    .cmd-note{font-size:11px;color:var(--dim);line-height:1.6;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);}

    .foot{font-size:12px;color:var(--dim);border-top:1px solid var(--border);padding:.75rem 2rem;flex-shrink:0;}
    .foot a{color:var(--link);text-decoration:none;}.foot a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/kubectl-explain</span>
      <button class="toggle" id="toggle">light</button>
    </div>
    <div class="body">
      <p class="head"><span class="prompt">sharan@sre:~$</span> <span class="cmd">./kubectl-explain</span></p>

      <input class="search-input" id="search" placeholder="search commands...">

      <div class="categories" id="cats"></div>
      <div class="cmd-list" id="cmd-list"></div>
    </div>
    <div class="foot"><span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a></div>
  </div>
  <script>
    const CMDS=[
      {cat:'pods',name:'kubectl get pods',summary:'List all pods in current namespace',
       examples:['kubectl get pods','kubectl get pods <span class="flag">-n kube-system</span>','kubectl get pods <span class="flag">-o wide</span>','kubectl get pods <span class="flag">--all-namespaces</span>'],
       note:'Add -w to watch for changes. -o wide shows node and IP.'},
      {cat:'pods',name:'kubectl describe pod',summary:'Show detailed info about a pod',
       examples:['kubectl describe pod <span class="kw">&lt;pod-name&gt;</span>','kubectl describe pod <span class="kw">&lt;pod-name&gt;</span> <span class="flag">-n &lt;ns&gt;</span>'],
       note:'Check Events section at the bottom — usually where crash reasons appear.'},
      {cat:'pods',name:'kubectl logs',summary:'Fetch container logs',
       examples:['kubectl logs <span class="kw">&lt;pod&gt;</span>','kubectl logs <span class="kw">&lt;pod&gt;</span> <span class="flag">-f</span>','kubectl logs <span class="kw">&lt;pod&gt;</span> <span class="flag">--previous</span>','kubectl logs <span class="kw">&lt;pod&gt;</span> <span class="flag">-c &lt;container&gt;</span>'],
       note:'--previous shows logs of the last crashed container. Essential for CrashLoopBackOff debugging.'},
      {cat:'pods',name:'kubectl exec',summary:'Run a command inside a pod',
       examples:['kubectl exec <span class="flag">-it</span> <span class="kw">&lt;pod&gt;</span> <span class="flag">-- /bin/sh</span>','kubectl exec <span class="kw">&lt;pod&gt;</span> <span class="flag">-- curl localhost:8080/health</span>'],
       note:'Use -- to separate kubectl flags from the command. /bin/bash if sh isn\'t available.'},
      {cat:'pods',name:'kubectl delete pod',summary:'Delete a pod (will restart if managed by a controller)',
       examples:['kubectl delete pod <span class="kw">&lt;pod&gt;</span>','kubectl delete pod <span class="kw">&lt;pod&gt;</span> <span class="flag">--grace-period=0 --force</span>'],
       note:'Force delete only if stuck in Terminating state. Normal delete triggers graceful shutdown.'},
      {cat:'deployments',name:'kubectl rollout status',summary:'Watch a rollout until complete',
       examples:['kubectl rollout status deployment/<span class="kw">&lt;name&gt;</span>','kubectl rollout status deployment/<span class="kw">&lt;name&gt;</span> <span class="flag">--timeout=2m</span>'],
       note:'Use in CI/CD pipelines to block until deploy succeeds or times out.'},
      {cat:'deployments',name:'kubectl rollout undo',summary:'Roll back to previous deployment',
       examples:['kubectl rollout undo deployment/<span class="kw">&lt;name&gt;</span>','kubectl rollout undo deployment/<span class="kw">&lt;name&gt;</span> <span class="flag">--to-revision=2</span>'],
       note:'Check rollout history first: kubectl rollout history deployment/&lt;name&gt;'},
      {cat:'deployments',name:'kubectl scale',summary:'Scale replicas up or down',
       examples:['kubectl scale deployment/<span class="kw">&lt;name&gt;</span> <span class="flag">--replicas=3</span>','kubectl scale deployment/<span class="kw">&lt;name&gt;</span> <span class="flag">--replicas=0</span>'],
       note:'Scaling to 0 is a quick way to stop all pods without deleting the deployment.'},
      {cat:'deployments',name:'kubectl set image',summary:'Update container image in a deployment',
       examples:['kubectl set image deployment/<span class="kw">&lt;name&gt;</span> <span class="kw">&lt;container&gt;</span>=<span class="kw">&lt;image:tag&gt;</span>'],
       note:'Triggers a rolling update. Follow with kubectl rollout status to watch progress.'},
      {cat:'debug',name:'kubectl top',summary:'Show CPU/memory usage',
       examples:['kubectl top pods','kubectl top pods <span class="flag">--sort-by=memory</span>','kubectl top nodes'],
       note:'Requires metrics-server installed. Great for spotting memory leaks under load.'},
      {cat:'debug',name:'kubectl port-forward',summary:'Forward a local port to a pod',
       examples:['kubectl port-forward <span class="kw">&lt;pod&gt;</span> 8080:80','kubectl port-forward svc/<span class="kw">&lt;svc&gt;</span> 9090:9090'],
       note:'Useful to reach Prometheus, Grafana, or any internal service without ingress.'},
      {cat:'debug',name:'kubectl cp',summary:'Copy files to/from a pod',
       examples:['kubectl cp <span class="kw">&lt;pod&gt;</span>:/var/log/app.log ./app.log','kubectl cp ./config.yaml <span class="kw">&lt;pod&gt;</span>:/tmp/config.yaml'],
       note:'Useful for extracting crash dumps or injecting configs for debugging.'},
      {cat:'debug',name:'kubectl get events',summary:'Show cluster events sorted by time',
       examples:['kubectl get events <span class="flag">--sort-by=.lastTimestamp</span>','kubectl get events <span class="flag">-n &lt;ns&gt; --sort-by=.lastTimestamp</span>'],
       note:'First place to check during an incident. Shows OOMKills, scheduling failures, image pull errors.'},
      {cat:'config',name:'kubectl config use-context',summary:'Switch between clusters/contexts',
       examples:['kubectl config use-context <span class="kw">&lt;context&gt;</span>','kubectl config get-contexts','kubectl config current-context'],
       note:'Use kubectx tool for faster context switching across many clusters.'},
      {cat:'config',name:'kubectl apply',summary:'Apply a manifest file',
       examples:['kubectl apply <span class="flag">-f</span> manifest.yaml','kubectl apply <span class="flag">-f</span> ./k8s/','kubectl apply <span class="flag">-k</span> ./kustomize/'],
       note:'Idempotent — safe to run multiple times. Use --dry-run=client to preview changes.'},
      {cat:'config',name:'kubectl diff',summary:'Show what would change before applying',
       examples:['kubectl diff <span class="flag">-f</span> manifest.yaml'],
       note:'Always run before kubectl apply in production. Shows exact resource diffs.'},
    ];

    const cats=['all',...new Set(CMDS.map(c=>c.cat))];
    let activeCat='all',search='';

    const catWrap=document.getElementById('cats');
    cats.forEach(c=>{
      const b=document.createElement('button');
      b.className='cat-btn'+(c==='all'?' active':'');
      b.textContent=c;
      b.addEventListener('click',()=>{
        activeCat=c;
        document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        render();
      });
      catWrap.appendChild(b);
    });

    document.getElementById('search').addEventListener('input',function(){search=this.value.toLowerCase();render();});

    function render(){
      const list=document.getElementById('cmd-list');
      const filtered=CMDS.filter(c=>{
        const matchCat=activeCat==='all'||c.cat===activeCat;
        const matchSearch=!search||c.name.toLowerCase().includes(search)||c.summary.toLowerCase().includes(search);
        return matchCat&&matchSearch;
      });
      list.innerHTML=filtered.map((c,i)=>`
        <div class="cmd-card" data-i="${i}">
          <div class="cmd-top">
            <span class="cmd-name">${c.name}</span>
            <span class="cmd-cat">${c.cat}</span>
          </div>
          <div class="cmd-summary">${c.summary}</div>
          <div class="cmd-detail">
            ${c.examples.map(e=>`<div class="cmd-example"><span class="kw">$</span> ${e}</div>`).join('')}
            <div class="cmd-note">${c.note}</div>
          </div>
        </div>
      `).join('');
      list.querySelectorAll('.cmd-card').forEach(card=>{
        card.addEventListener('click',()=>card.classList.toggle('open'));
      });
    }

    render();

    document.getElementById('toggle').addEventListener('click',function(){
      document.body.classList.toggle('light');
      this.textContent=document.body.classList.contains('light')?'dark':'light';
    });
  </script>
</body>
</html>
