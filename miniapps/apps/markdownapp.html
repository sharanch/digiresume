<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markdown-preview — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --chrome: #252525;
      --ink: #d4d4d4;
      --dim: #555;
      --bright: #f0f0f0;
      --prompt: #3fb950;
      --accent: #c8f53a;
      --link: #58a6ff;
      --font: 'Fira Code', monospace;
    }

    body.light {
      --bg: #f0f0f0;
      --surface: #e2e2e2;
      --border: #ccc;
      --chrome: #d0d0d0;
      --ink: #2a2a2a;
      --dim: #888;
      --bright: #111;
      --prompt: #1a7f37;
      --accent: #5a8a00;
      --link: #0969da;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      transition: background .2s, color .2s;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: 100%;
      max-width: 1000px;
      height: calc(100vh - 3rem);
      min-height: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .04em;
      margin-left: -60px;
    }

    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .15s, border-color .15s;
    }
    .toggle:hover { color: var(--ink); border-color: var(--ink); }

    /* ── MAIN LAYOUT ── */
    .editor-wrap {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* column headers */
    .col-head {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: .6rem 1.25rem .4rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .col-head.right { border-left: 1px solid var(--border); }

    /* panes */
    .pane {
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .pane.right { border-left: 1px solid var(--border); }

    textarea.pane {
      font-family: var(--font);
      font-size: 12.5px;
      line-height: 1.8;
      padding: 1.1rem 1.25rem;
      background: var(--bg);
      color: var(--ink);
      border: none;
      resize: none;
      outline: none;
    }
    textarea.pane::placeholder { color: var(--dim); }

    .preview-pane {
      padding: 1.1rem 1.25rem;
      background: var(--bg);
      font-size: 13px;
      line-height: 1.8;
    }

    /* ── MARKDOWN STYLES ── */
    .preview-pane h1 { font-size: 1.6rem; font-weight: 700; color: var(--bright); margin-bottom: .6rem; }
    .preview-pane h2 { font-size: 1.25rem; font-weight: 700; color: var(--bright); margin-bottom: .5rem; margin-top: 1rem; }
    .preview-pane h3 { font-size: 1rem; font-weight: 700; color: var(--bright); margin-bottom: .4rem; margin-top: .8rem; }
    .preview-pane p  { margin-bottom: .8rem; color: var(--ink); }
    .preview-pane a  { color: var(--link); text-decoration: underline; }
    .preview-pane strong { color: var(--bright); }
    .preview-pane em { color: var(--ink); font-style: italic; }
    .preview-pane ul, .preview-pane ol { padding-left: 1.25rem; margin-bottom: .8rem; }
    .preview-pane li { margin-bottom: .2rem; color: var(--ink); }
    .preview-pane code {
      font-family: var(--font);
      font-size: 11.5px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--accent);
    }
    .preview-pane pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: .85rem 1rem;
      overflow-x: auto;
      margin-bottom: .8rem;
    }
    .preview-pane pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--ink);
    }
    .preview-pane blockquote {
      border-left: 2px solid var(--accent);
      padding-left: .85rem;
      color: var(--dim);
      margin-bottom: .8rem;
    }
    .preview-pane hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    /* ── FOOTER ── */
    .foot {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding: .75rem 1.25rem;
    }
    .foot a { color: var(--link); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    .prompt { color: var(--prompt); font-weight: 700; }

    @media (max-width: 600px) {
      body { padding: .75rem; }
      .terminal { height: calc(100vh - 1.5rem); }
      .editor-wrap { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto 1fr auto; }
      .col-head.right, .pane.right { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="terminal" role="main">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/markdown-preview</span>
      <button class="toggle" id="toggle" aria-label="Toggle light/dark mode">light</button>
    </div>

    <div class="editor-wrap">
      <div class="col-head"><span class="prompt">$</span> input.md</div>
      <div class="col-head right"><span class="prompt">$</span> preview.html</div>

      <textarea
        class="pane"
        id="md-input"
        placeholder="# start typing markdown..."
        spellcheck="false"
      ></textarea>

      <div class="pane right preview-pane" id="preview"></div>

      <div class="foot">
        <span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a>
      </div>
    </div>

  </div>

  <script>
    const mdInput  = document.getElementById('md-input');
    const preview  = document.getElementById('preview');
    const toggleBtn= document.getElementById('toggle');

    const defaultMd = `# Hello, Markdown!

Write your markdown on the left and see it render here.

**Bold**, *italic*, \`inline code\`

## Code block
\`\`\`javascript
function greet() {
  console.log('hello, world');
}
\`\`\`

## List
- Kubernetes
- Terraform
- Prometheus

> "Reliability is a feature." — every SRE ever
`;

    function render() {
      preview.innerHTML = marked.parse(mdInput.value);
    }

    mdInput.value = defaultMd;
    render();
    mdInput.addEventListener('input', render);

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      toggleBtn.textContent = document.body.classList.contains('light') ? 'dark' : 'light';
    });
  </script>
</body>
</html>
