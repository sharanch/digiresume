
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>password-gen — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --chrome: #252525;
      --ink: #d4d4d4;
      --dim: #555;
      --bright: #f0f0f0;
      --prompt: #3fb950;
      --accent: #c8f53a;
      --link: #58a6ff;
      --font: 'Fira Code', monospace;
    }

    body.light {
      --bg: #f0f0f0;
      --surface: #e2e2e2;
      --border: #ccc;
      --chrome: #d0d0d0;
      --ink: #2a2a2a;
      --dim: #888;
      --bright: #111;
      --prompt: #1a7f37;
      --accent: #5a8a00;
      --link: #0969da;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      transition: background .2s, color .2s;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .04em;
      margin-left: -60px;
    }

    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .15s, border-color .15s;
    }
    .toggle:hover { color: var(--ink); border-color: var(--ink); }

    .body { padding: 1.75rem 2rem 1.5rem; }

    .prompt { color: var(--prompt); font-weight: 700; }
    .cmd    { color: var(--bright); }

    .head { font-size: 13px; margin-bottom: 1.5rem; }

    /* ── OUTPUT ROW ── */
    .output-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .pw-output {
      flex: 1;
      font-family: var(--font);
      font-size: 12px;
      padding: .55rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--bright);
      outline: none;
      letter-spacing: .06em;
      min-width: 0;
    }
    .pw-output::placeholder { color: var(--dim); }

    .copy-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      padding: .5rem .9rem;
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    /* ── SETTINGS ── */
    .setting { margin-bottom: 1.1rem; }

    .setting-label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .5rem;
      display: flex;
      justify-content: space-between;
    }
    .setting-label span { color: var(--ink); }

    input[type="range"] {
      width: 100%;
      height: 3px;
      appearance: none;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .checkboxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem .75rem;
      margin-bottom: 1.25rem;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .check-row input[type="checkbox"] {
      appearance: none;
      width: 13px;
      height: 13px;
      border: 1px solid var(--dim);
      border-radius: 2px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: border-color .12s;
    }
    .check-row input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: var(--accent);
    }
    .check-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: 2px solid #0a0a0a;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .check-row label {
      font-size: 11px;
      color: var(--ink);
      cursor: pointer;
      letter-spacing: .04em;
    }

    /* ── GENERATE BTN ── */
    .gen-btn {
      width: 100%;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 700;
      padding: .6rem 0;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: opacity .15s;
      margin-bottom: 1.5rem;
    }
    .gen-btn:hover { opacity: .85; }

    /* ── TOAST ── */
    .toast {
      font-size: 11px;
      color: var(--accent);
      text-align: center;
      height: 16px;
      margin-bottom: .75rem;
      opacity: 0;
      transition: opacity .2s;
      letter-spacing: .06em;
    }
    .toast.show { opacity: 1; }

    /* ── FOOTER ── */
    .foot {
      font-size: 12px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .foot a { color: var(--link); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="terminal" role="main">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/password-gen</span>
      <button class="toggle" id="toggle" aria-label="Toggle light/dark mode">light</button>
    </div>

    <div class="body">

      <p class="head">
        <span class="prompt">sharan@sre:~$</span> <span class="cmd">./passwordGenerator</span>
      </p>

      <div class="output-row">
        <input class="pw-output" id="pw-output" type="text" readonly placeholder="generating...">
        <button class="copy-btn" id="copy-btn">copy</button>
      </div>

      <div class="setting">
        <div class="setting-label">length <span id="len-val">12</span></div>
        <input type="range" id="length" min="4" max="32" value="12" step="1">
      </div>

      <div class="checkboxes">
        <label class="check-row">
          <input type="checkbox" id="uppercase" checked>
          <span>uppercase</span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="lowercase" checked>
          <span>lowercase</span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="numbers" checked>
          <span>numbers</span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="symbols">
          <span>symbols</span>
        </label>
      </div>

      <button class="gen-btn" id="gen-btn">generate</button>

      <div class="toast" id="toast">copied to clipboard</div>

      <div class="foot">
        <span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a>
      </div>

    </div>
  </div>

  <script>
    const pwOutput  = document.getElementById('pw-output');
    const copyBtn   = document.getElementById('copy-btn');
    const genBtn    = document.getElementById('gen-btn');
    const lenSlider = document.getElementById('length');
    const lenVal    = document.getElementById('len-val');
    const toast     = document.getElementById('toast');
    const toggleBtn = document.getElementById('toggle');

    const UC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const LC = 'abcdefghijklmnopqrstuvwxyz';
    const NUM= '0123456789';
    const SYM= '!@#$%^&*()_+-=[]{}|;:",.<>/?`~';

    lenSlider.addEventListener('input', () => { lenVal.textContent = lenSlider.value; });

    function generate() {
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += UC;
      if (document.getElementById('lowercase').checked) chars += LC;
      if (document.getElementById('numbers').checked)   chars += NUM;
      if (document.getElementById('symbols').checked)   chars += SYM;
      if (!chars) { pwOutput.value = 'select at least one option'; return; }
      let pw = '';
      for (let i = 0; i < +lenSlider.value; i++)
        pw += chars[Math.floor(Math.random() * chars.length)];
      pwOutput.value = pw;
    }

    genBtn.addEventListener('click', generate);

    let toastTimer;
    copyBtn.addEventListener('click', () => {
      if (!pwOutput.value) return;
      navigator.clipboard.writeText(pwOutput.value).catch(() => {
        pwOutput.select();
        document.execCommand('copy');
      });
      copyBtn.classList.add('copied');
      copyBtn.textContent = 'done';
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
        copyBtn.classList.remove('copied');
        copyBtn.textContent = 'copy';
      }, 2000);
    });

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      toggleBtn.textContent = document.body.classList.contains('light') ? 'dark' : 'light';
    });

    generate();
  </script>
</body>
</html>
