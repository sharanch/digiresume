<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pomodoro — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.58/build/Tone.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --chrome: #252525;
      --ink: #d4d4d4;
      --dim: #555;
      --bright: #f0f0f0;
      --prompt: #3fb950;
      --accent: #c8f53a;
      --link: #58a6ff;
      --font: 'Fira Code', monospace;
    }

    body.light {
      --bg: #f0f0f0;
      --surface: #e2e2e2;
      --border: #ccc;
      --chrome: #d0d0d0;
      --ink: #2a2a2a;
      --dim: #888;
      --bright: #111;
      --prompt: #1a7f37;
      --accent: #5a8a00;
      --link: #0969da;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      transition: background .2s, color .2s;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .04em;
      margin-left: -60px;
    }

    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .15s, border-color .15s;
    }
    .toggle:hover { color: var(--ink); border-color: var(--ink); }

    .body {
      padding: 2rem 2rem 1.5rem;
    }

    .prompt { color: var(--prompt); font-weight: 700; }
    .cmd    { color: var(--bright); }

    /* ── TIMER ── */
    .timer-head {
      font-size: 13px;
      margin-bottom: 1.75rem;
    }

    .session-type {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-top: .4rem;
    }

    .timer-display {
      font-size: clamp(4rem, 18vw, 5.5rem);
      font-weight: 700;
      color: var(--bright);
      text-align: center;
      letter-spacing: .04em;
      margin: 1.25rem 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── CONTROLS ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      padding: .55rem 0;
      border-radius: 5px;
      border: 1px solid;
      cursor: pointer;
      letter-spacing: .04em;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .8; }

    .btn-start  { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
    .btn-pause  { background: transparent;   color: var(--ink); border-color: var(--border); }
    .btn-reset  { background: transparent;   color: var(--dim); border-color: var(--border); }

    /* ── SESSION SWITCH ── */
    .session-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 1.75rem;
    }

    .sess-btn {
      font-family: var(--font);
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .04em;
      transition: color .15s, border-color .15s;
    }

    .sess-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── FOOTER ── */
    .foot {
      font-size: 12px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: .25rem;
    }

    .foot a {
      color: var(--link);
      text-decoration: none;
    }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="terminal" role="main">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/pomodoro</span>
      <button class="toggle" id="toggle" aria-label="Toggle light/dark mode">light</button>
    </div>

    <div class="body">

      <div class="timer-head">
        <span class="prompt">sharan@sre:~$</span> <span class="cmd">./pomodoro</span>
        <p class="session-type" id="session-type">work session</p>
      </div>

      <div class="timer-display" id="timer">25:00</div>

      <div class="controls">
        <button class="btn btn-start" id="start-btn">start</button>
        <button class="btn btn-pause" id="pause-btn">pause</button>
        <button class="btn btn-reset" id="reset-btn">reset</button>
      </div>

      <div class="session-switch">
        <button class="sess-btn active" id="work-btn">work (25 min)</button>
        <button class="sess-btn" id="break-btn">break (5 min)</button>
      </div>

      <div class="foot">
        <span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a>
      </div>

    </div>
  </div>

  <script>
    const timerEl      = document.getElementById('timer');
    const sessionLabel = document.getElementById('session-type');
    const startBtn     = document.getElementById('start-btn');
    const pauseBtn     = document.getElementById('pause-btn');
    const resetBtn     = document.getElementById('reset-btn');
    const workBtn      = document.getElementById('work-btn');
    const breakBtn     = document.getElementById('break-btn');
    const toggleBtn    = document.getElementById('toggle');

    const WORK  = 25 * 60;
    const BREAK = 5  * 60;

    let timeRemaining = WORK;
    let sessionType   = 'work';
    let isPaused      = true;
    let rafId, lastTs;

    const synth = new Tone.Synth().toDestination();

    function fmt(s) {
      return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    function render() { timerEl.textContent = fmt(timeRemaining); }

    function loop(ts) {
      if (!lastTs) lastTs = ts;
      const elapsed = (ts - lastTs) / 1000;
      if (elapsed >= 1) {
        timeRemaining = Math.max(0, timeRemaining - Math.floor(elapsed));
        render();
        lastTs = ts;
      }
      if (timeRemaining <= 0) { synth.triggerAttackRelease('C4','8n'); switchSession(); return; }
      rafId = requestAnimationFrame(loop);
    }

    function start() {
      if (!isPaused) return;
      isPaused = false; lastTs = null;
      rafId = requestAnimationFrame(loop);
    }

    function pause() {
      isPaused = true;
      cancelAnimationFrame(rafId);
    }

    function reset() {
      pause();
      timeRemaining = sessionType === 'work' ? WORK : BREAK;
      render();
    }

    function setSession(type) {
      pause();
      sessionType = type;
      timeRemaining = type === 'work' ? WORK : BREAK;
      sessionLabel.textContent = type === 'work' ? 'work session' : 'break session';
      workBtn.classList.toggle('active',  type === 'work');
      breakBtn.classList.toggle('active', type === 'break');
      render();
    }

    function switchSession() { setSession(sessionType === 'work' ? 'break' : 'work'); }

    startBtn.addEventListener('click', start);
    pauseBtn.addEventListener('click', pause);
    resetBtn.addEventListener('click', reset);
    workBtn.addEventListener('click',  () => setSession('work'));
    breakBtn.addEventListener('click', () => setSession('break'));

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      toggleBtn.textContent = document.body.classList.contains('light') ? 'dark' : 'light';
    });

    render();
  </script>
</body>
</html>
