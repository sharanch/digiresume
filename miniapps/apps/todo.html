<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>to-do — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --chrome: #252525;
      --ink: #d4d4d4;
      --dim: #555;
      --bright: #f0f0f0;
      --prompt: #3fb950;
      --accent: #c8f53a;
      --link: #58a6ff;
      --danger: #f85149;
      --font: 'Fira Code', monospace;
    }

    body.light {
      --bg: #f0f0f0;
      --surface: #e2e2e2;
      --border: #ccc;
      --chrome: #d0d0d0;
      --ink: #2a2a2a;
      --dim: #888;
      --bright: #111;
      --prompt: #1a7f37;
      --accent: #5a8a00;
      --link: #0969da;
      --danger: #cf222e;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      transition: background .2s, color .2s;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .04em;
      margin-left: -60px;
    }

    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .15s, border-color .15s;
    }
    .toggle:hover { color: var(--ink); border-color: var(--ink); }

    .body {
      padding: 1.75rem 2rem 1.5rem;
    }

    .prompt { color: var(--prompt); font-weight: 700; }
    .cmd    { color: var(--bright); }

    .head {
      font-size: 13px;
      margin-bottom: 1.5rem;
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .task-input {
      flex: 1;
      font-family: var(--font);
      font-size: 12px;
      padding: .5rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
    }
    .task-input::placeholder { color: var(--dim); }
    .task-input:focus { border-color: var(--accent); }

    .add-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      padding: .5rem 1rem;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .add-btn:hover { opacity: .85; }

    /* ── TASK LIST ── */
    .task-list {
      list-style: none;
      margin-bottom: 1.5rem;
      min-height: 2rem;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .task-item:last-child { border-bottom: none; }

    .task-check {
      width: 14px;
      height: 14px;
      border: 1px solid var(--dim);
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--accent);
      transition: border-color .12s;
    }
    .task-item.done .task-check {
      border-color: var(--accent);
    }

    .task-text {
      flex: 1;
      font-size: 12px;
      color: var(--ink);
      transition: color .12s;
      line-height: 1.5;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--dim);
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color .12s;
      line-height: 1;
    }
    .del-btn:hover { color: var(--danger); }

    .empty {
      font-size: 11px;
      color: var(--dim);
      padding: .5rem 0;
    }

    /* ── FOOTER ── */
    .foot {
      font-size: 12px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .foot a { color: var(--link); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="terminal" role="main">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/to-do</span>
      <button class="toggle" id="toggle" aria-label="Toggle light/dark mode">light</button>
    </div>

    <div class="body">

      <p class="head">
        <span class="prompt">sharan@sre:~$</span> <span class="cmd">./toDo</span>
      </p>

      <div class="input-row">
        <input class="task-input" id="task-input" type="text" placeholder="add a new task..." autocomplete="off">
        <button class="add-btn" id="add-btn">+ add</button>
      </div>

      <ul class="task-list" id="task-list"></ul>

      <div class="foot">
        <span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a>
      </div>

    </div>
  </div>

  <script>
    const input    = document.getElementById('task-input');
    const addBtn   = document.getElementById('add-btn');
    const list     = document.getElementById('task-list');
    const toggleBtn= document.getElementById('toggle');

    let tasks = JSON.parse(localStorage.getItem('sre-tasks') || '[]');

    function save() { localStorage.setItem('sre-tasks', JSON.stringify(tasks)); }

    function render() {
      list.innerHTML = '';
      if (!tasks.length) {
        list.innerHTML = '<li class="empty">> no tasks yet</li>';
        return;
      }
      tasks.forEach((t, i) => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');
        li.innerHTML = `
          <div class="task-check">${t.done ? '✓' : ''}</div>
          <span class="task-text">${t.text}</span>
          <button class="del-btn" data-i="${i}" aria-label="delete task">×</button>
        `;
        li.addEventListener('click', (e) => {
          if (e.target.closest('.del-btn')) {
            tasks.splice(i, 1);
          } else {
            tasks[i].done = !tasks[i].done;
          }
          save(); render();
        });
        list.appendChild(li);
      });
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      input.value = '';
      save(); render();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      toggleBtn.textContent = document.body.classList.contains('light') ? 'dark' : 'light';
    });

    render();
  </script>
</body>
</html>
