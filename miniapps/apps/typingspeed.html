<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>typing-test — sharanch.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --chrome: #252525;
      --ink: #d4d4d4;
      --dim: #555;
      --bright: #f0f0f0;
      --prompt: #3fb950;
      --accent: #c8f53a;
      --link: #58a6ff;
      --correct: #3fb950;
      --wrong: #f85149;
      --font: 'Fira Code', monospace;
    }

    body.light {
      --bg: #f0f0f0;
      --surface: #e2e2e2;
      --border: #ccc;
      --chrome: #d0d0d0;
      --ink: #2a2a2a;
      --dim: #888;
      --bright: #111;
      --prompt: #1a7f37;
      --accent: #5a8a00;
      --link: #0969da;
      --correct: #1a7f37;
      --wrong: #cf222e;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      transition: background .2s, color .2s;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .titlebar {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .titlebar-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .04em;
      margin-left: -60px;
    }

    .toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: .06em;
      transition: color .15s, border-color .15s;
    }
    .toggle:hover { color: var(--ink); border-color: var(--ink); }

    .body { padding: 1.75rem 2rem 1.5rem; }

    .prompt { color: var(--prompt); font-weight: 700; }
    .cmd    { color: var(--bright); }

    .head { font-size: 13px; margin-bottom: 1.5rem; }

    /* ── TEXT DISPLAY ── */
    .text-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1rem;
      margin-bottom: 1rem;
      font-size: 14px;
      line-height: 1.9;
      min-height: 80px;
      letter-spacing: .02em;
    }

    .text-box .untyped { color: var(--dim); }
    .text-box .correct { color: var(--correct); }
    .text-box .wrong   { color: var(--wrong); }

    /* ── INPUT ── */
    .typing-input {
      width: 100%;
      font-family: var(--font);
      font-size: 13px;
      padding: .65rem .85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--ink);
      resize: none;
      outline: none;
      height: 72px;
      margin-bottom: 1.25rem;
      transition: border-color .15s;
    }
    .typing-input:focus { border-color: var(--accent); }
    .typing-input::placeholder { color: var(--dim); }
    .typing-input:disabled { opacity: .4; cursor: not-allowed; }

    /* ── RESULTS ── */
    .results {
      display: none;
      gap: 1.5rem;
      margin-bottom: 1.25rem;
      padding: .75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .results.show { display: flex; }

    .stat { display: flex; flex-direction: column; gap: 3px; }
    .stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .04em;
    }
    .stat-label {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    /* ── BUTTONS ── */
    .btn-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }

    .btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      padding: .55rem 1.1rem;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      letter-spacing: .04em;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-start { background: var(--accent); color: #0a0a0a; }
    .btn-new   { background: transparent; color: var(--ink); border: 1px solid var(--border); }
    .hidden    { display: none !important; }

    /* ── FOOTER ── */
    .foot {
      font-size: 12px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .foot a { color: var(--link); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="terminal" role="main">

    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="titlebar-title">sharan@sre: ~/typing-test</span>
      <button class="toggle" id="toggle" aria-label="Toggle light/dark mode">light</button>
    </div>

    <div class="body">

      <p class="head">
        <span class="prompt">sharan@sre:~$</span> <span class="cmd">./typingSpeed</span>
      </p>

      <div class="text-box" id="text-box"></div>

      <textarea
        class="typing-input"
        id="typing-input"
        placeholder="press start, then type here..."
        disabled
      ></textarea>

      <div class="results" id="results">
        <div class="stat">
          <span class="stat-val" id="wpm">0</span>
          <span class="stat-label">wpm</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="accuracy">0%</span>
          <span class="stat-label">accuracy</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-start" id="start-btn">start test</button>
        <button class="btn btn-new hidden" id="new-btn">new test</button>
      </div>

      <div class="foot">
        <span class="prompt">sharan@sre:~$</span> <a href="apps.html">cd ..</a>
      </div>

    </div>
  </div>

  <script>
    const textBox    = document.getElementById('text-box');
    const input      = document.getElementById('typing-input');
    const startBtn   = document.getElementById('start-btn');
    const newBtn     = document.getElementById('new-btn');
    const resultsEl  = document.getElementById('results');
    const wpmEl      = document.getElementById('wpm');
    const accEl      = document.getElementById('accuracy');
    const toggleBtn  = document.getElementById('toggle');

    const paragraphs = [
      "The quick brown fox jumps over the lazy dog.",
      "A journey of a thousand miles begins with a single step.",
      "To be or not to be, that is the question.",
      "The only thing we have to fear is fear itself.",
      "All that glitters is not gold.",
      "In the middle of difficulty lies opportunity.",
      "It does not matter how slowly you go as long as you do not stop.",
    ];

    let current = '', startTime = null, total = 0;

    function reset() {
      current = ''; startTime = null; total = 0;
      textBox.innerHTML = '';
      input.value = '';
      input.disabled = true;
      resultsEl.classList.remove('show');
      startBtn.classList.remove('hidden');
      newBtn.classList.add('hidden');
    }

    function start() {
      current = paragraphs[Math.floor(Math.random() * paragraphs.length)];
      total = current.length;
      textBox.innerHTML = current.split('').map(c =>
        `<span class="untyped">${c}</span>`
      ).join('');
      input.disabled = false;
      input.value = '';
      input.focus();
      startTime = Date.now();
      startBtn.classList.add('hidden');
      newBtn.classList.remove('hidden');
      resultsEl.classList.remove('show');
    }

    function onInput() {
      const typed = input.value;
      const spans = textBox.querySelectorAll('span');
      let correct = 0;

      spans.forEach((s, i) => {
        s.className = typed[i] == null ? 'untyped'
          : typed[i] === current[i] ? 'correct'
          : 'wrong';
        if (typed[i] === current[i]) correct++;
      });

      if (typed.length >= total) {
        input.disabled = true;
        const mins = (Date.now() - startTime) / 60000;
        wpmEl.textContent  = Math.round((correct / 5) / mins) || 0;
        accEl.textContent  = total ? Math.round((correct / typed.length) * 100) + '%' : '0%';
        resultsEl.classList.add('show');
      }
    }

    startBtn.addEventListener('click', start);
    newBtn.addEventListener('click', reset);
    input.addEventListener('input', onInput);

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      toggleBtn.textContent = document.body.classList.contains('light') ? 'dark' : 'light';
    });

    reset();
  </script>
</body>
</html>
